<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devis & Factures France - GitHub</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d8dee9;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --soft: #eff6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px;
      background: linear-gradient(135deg, #111827, #2563eb);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      opacity: 0.9;
    }

    .container {
      max-width: 1350px;
      margin: auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 450px 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .panel-title {
      padding: 14px 16px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      background: #f9fafb;
    }

    .panel-body {
      padding: 16px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
      background: #f9fafb;
    }

    .tab-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tab { display: none; }
    .tab.active { display: block; }

    .field {
      margin-bottom: 11px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: bold;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }

    button:hover { filter: brightness(0.96); }

    button.secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.success { background: var(--success); }
    button.danger { background: var(--danger); }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .line-card {
      border: 1px solid var(--border);
      background: #fbfdff;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .line-grid {
      display: grid;
      grid-template-columns: 1.7fr 0.6fr 0.7fr 0.8fr 0.7fr 0.7fr 42px;
      gap: 8px;
      align-items: end;
    }

    .mini {
      padding: 9px;
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .preview-wrapper {
      position: sticky;
      top: 10px;
      align-self: start;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      margin: auto;
      padding: 15mm;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.35;
      color: #111;
    }

    .doc-header {
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      gap: 18px;
      border-bottom: 3px solid #111;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .company-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .doc-title {
      text-align: right;
    }

    .doc-title h2 {
      margin: 0 0 8px;
      font-size: 31px;
      letter-spacing: 1px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta-table td {
      padding: 3px 0;
      vertical-align: top;
    }

    .meta-table td:first-child {
      width: 130px;
      color: #4b5563;
      font-weight: bold;
    }

    .boxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .box {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      min-height: 95px;
    }

    .box h3 {
      margin: 0 0 8px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .items th {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      padding: 7px 6px;
      text-align: left;
      font-size: 11px;
    }

    .items td {
      border: 1px solid #e5e7eb;
      padding: 7px 6px;
      vertical-align: top;
    }

    .right { text-align: right; }
    .center { text-align: center; }

    .totals-zone {
      display: grid;
      grid-template-columns: 1fr 255px;
      gap: 20px;
      margin-top: 14px;
    }

    .totals td {
      padding: 7px 4px;
      border-bottom: 1px solid #e5e7eb;
    }

    .totals .grand td {
      border-top: 2px solid #111;
      border-bottom: 2px solid #111;
      font-size: 16px;
      font-weight: bold;
    }

    .signature-zone {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .signature {
      height: 85px;
      border: 1px dashed #9ca3af;
      border-radius: 8px;
      padding: 8px;
      color: #6b7280;
    }

    .legal {
      margin-top: 18px;
      padding-top: 10px;
      border-top: 1px solid #d1d5db;
      font-size: 10.5px;
      color: #222;
    }

    .check {
      padding: 8px;
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 9px;
      margin-bottom: 7px;
      background: #f9fafb;
      font-size: 12px;
    }

    .check.ok { border-left-color: var(--success); }
    .check.warn { border-left-color: var(--warning); }

    @media (max-width: 1120px) {
      .container { grid-template-columns: 1fr; }
      .preview-wrapper { position: static; }
      .paper {
        width: 100%;
        min-height: auto;
        padding: 18px;
      }
      .line-grid { grid-template-columns: 1fr 1fr; }
    }

    @media print {
      body { background: #fff; }
      header, .editor, .no-print { display: none !important; }
      .container {
        display: block;
        padding: 0;
        max-width: none;
      }
      .panel {
        border: none;
        box-shadow: none;
      }
      .panel-title { display: none; }
      .panel-body { padding: 0; }
      .paper {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 14mm;
        border: none;
        box-shadow: none;
      }
      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Application Devis & Factures - France</h1>
    <p>Fichier unique HTML pour GitHub Pages. Remplir, calculer, sauvegarder localement, imprimer en PDF.</p>
  </header>

  <main class="container">
    <section class="panel editor">
      <div class="tabs">
        <button class="tab-btn active" data-tab="document">Document</button>
        <button class="tab-btn" data-tab="entreprise">Entreprise</button>
        <button class="tab-btn" data-tab="client">Client</button>
        <button class="tab-btn" data-tab="lignes">Lignes</button>
        <button class="tab-btn" data-tab="mentions">Mentions</button>
      </div>

      <div class="panel-body">

        <div id="tab-document" class="tab active">
          <div class="grid-2">
            <div class="field">
              <label>Type</label>
              <select id="docType">
                <option>Devis</option>
                <option>Facture</option>
                <option>Facture d'acompte</option>
                <option>Avoir</option>
              </select>
            </div>

            <div class="field">
              <label>Numéro unique</label>
              <input id="docNumber" placeholder="Ex : DEV-2026-001 ou FAC-2026-001">
            </div>
          </div>

          <div class="grid-3">
            <div class="field">
              <label>Date d'émission</label>
              <input id="issueDate" type="date">
            </div>
            <div class="field">
              <label>Date prestation/livraison</label>
              <input id="serviceDate" type="date">
            </div>
            <div class="field">
              <label>Date limite paiement</label>
              <input id="dueDate" type="date">
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Nature de l'opération</label>
              <select id="operationType">
                <option>Prestation de services</option>
                <option>Vente de biens</option>
                <option>Vente de biens et prestation de services</option>
              </select>
            </div>

            <div class="field">
              <label>Bon de commande client</label>
              <input id="purchaseOrder" placeholder="Facultatif">
            </div>
          </div>

          <div class="field">
            <label>Objet</label>
            <input id="object" placeholder="Ex : Nettoyage toiture, élagage, réparation, vente de matériel...">
          </div>

          <div class="field">
            <label>Notes visibles</label>
            <textarea id="notes" placeholder="Ex : Intervention sous 15 jours après acceptation du devis."></textarea>
          </div>
        </div>

        <div id="tab-entreprise" class="tab">
          <div class="field">
            <label>Nom / Raison sociale</label>
            <input id="sellerName" placeholder="Nom de ton entreprise">
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Forme juridique</label>
              <input id="legalForm" placeholder="SASU, EI, SARL, micro-entreprise...">
            </div>
            <div class="field">
              <label>Capital social</label>
              <input id="capital" placeholder="Ex : 1 000 €">
            </div>
          </div>

          <div class="field">
            <label>Adresse de l'entreprise</label>
            <textarea id="sellerAddress" placeholder="Adresse complète"></textarea>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>SIREN</label>
              <input id="sellerSiren" placeholder="9 chiffres">
            </div>
            <div class="field">
              <label>SIRET</label>
              <input id="sellerSiret" placeholder="14 chiffres">
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>RCS / RM</label>
              <input id="sellerRcs" placeholder="Ex : RCS Lyon 123 456 789">
            </div>
            <div class="field">
              <label>N° TVA intracommunautaire</label>
              <input id="sellerVat" placeholder="Ex : FR...">
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Téléphone</label>
              <input id="sellerPhone" placeholder="06...">
            </div>
            <div class="field">
              <label>Email</label>
              <input id="sellerEmail" placeholder="contact@exemple.fr">
            </div>
          </div>

          <div class="field">
            <label>Coordonnées de paiement</label>
            <textarea id="paymentInfo" placeholder="IBAN : FR...&#10;BIC : ..."></textarea>
          </div>
        </div>

        <div id="tab-client" class="tab">
          <div class="grid-2">
            <div class="field">
              <label>Client professionnel ?</label>
              <select id="clientPro">
                <option value="oui">Oui</option>
                <option value="non">Non, particulier</option>
              </select>
            </div>
            <div class="field">
              <label>Email client</label>
              <input id="clientEmail" placeholder="client@exemple.fr">
            </div>
          </div>

          <div class="field">
            <label>Nom / Raison sociale client</label>
            <input id="clientName" placeholder="Nom du client">
          </div>

          <div class="field">
            <label>Adresse client</label>
            <textarea id="clientAddress" placeholder="Adresse complète du client"></textarea>
          </div>

          <div class="field">
            <label>Adresse de facturation si différente</label>
            <textarea id="billingAddress" placeholder="Facultatif"></textarea>
          </div>

          <div class="field">
            <label>Adresse de livraison si différente</label>
            <textarea id="deliveryAddress" placeholder="À remplir si vente de biens et adresse différente"></textarea>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>SIREN client si entreprise</label>
              <input id="clientSiren" placeholder="Nouvelle mention facture électronique">
            </div>
            <div class="field">
              <label>N° TVA client</label>
              <input id="clientVat" placeholder="Facultatif">
            </div>
          </div>
        </div>

        <div id="tab-lignes" class="tab">
          <div id="lines"></div>

          <div class="buttons">
            <button onclick="addLine()">+ Ajouter une ligne</button>
            <button class="secondary" onclick="addService()">+ Service</button>
            <button class="secondary" onclick="addProduct()">+ Produit</button>
          </div>

          <p class="small">
            Tu peux choisir un taux de TVA différent par ligne : 20 %, 10 %, 5,5 %, 2,1 % ou 0 %.
          </p>
        </div>

        <div id="tab-mentions" class="tab">
          <div class="grid-2">
            <div class="field">
              <label>Régime de TVA</label>
              <select id="vatRegime">
                <option value="normal">TVA applicable</option>
                <option value="franchise">Franchise en base de TVA</option>
                <option value="autoliquidation">Autoliquidation</option>
              </select>
            </div>

            <div class="field">
              <label>TVA sur les débits</label>
              <select id="vatDebit">
                <option value="non">Non</option>
                <option value="oui">Oui, option pour le paiement de la taxe d’après les débits</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Conditions de paiement</label>
              <input id="paymentTerms" value="30 jours">
            </div>
            <div class="field">
              <label>Pénalités de retard</label>
              <input id="latePenalty" value="Taux BCE + 10 points">
            </div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Validité du devis</label>
              <input id="quoteValidity" value="30 jours">
            </div>
            <div class="field">
              <label>Escompte paiement anticipé</label>
              <input id="discountTerms" value="Aucun escompte pour paiement anticipé">
            </div>
          </div>

          <div class="field">
            <label>Assurance professionnelle / décennale si nécessaire</label>
            <textarea id="insurance" placeholder="Ex : Assurance décennale : assureur, numéro de contrat, zone géographique."></textarea>
          </div>

          <div class="field">
            <label>Mentions personnalisées</label>
            <textarea id="customLegal" placeholder="Ex : Les travaux supplémentaires feront l'objet d'un avenant."></textarea>
          </div>

          <h3>Checklist rapide</h3>
          <div id="checklist"></div>
        </div>

        <div class="buttons no-print">
          <button class="success" onclick="printPDF()">Imprimer / PDF</button>
          <button onclick="saveData()">Sauvegarder</button>
          <button class="secondary" onclick="loadData()">Recharger</button>
          <button class="secondary" onclick="convertToInvoice()">Devis → Facture</button>
          <button class="secondary" onclick="exportJSON()">Exporter JSON</button>
          <button class="secondary" onclick="document.getElementById('importFile').click()">Importer JSON</button>
          <button class="danger" onclick="resetApp()">Effacer</button>
          <input type="file" id="importFile" accept=".json,application/json" style="display:none">
        </div>
      </div>
    </section>

    <section class="panel preview-wrapper">
      <div class="panel-title">Aperçu document A4</div>
      <div class="panel-body" style="overflow:auto;">
        <div class="paper" id="paper"></div>
      </div>
    </section>
  </main>

  <script>
    const fields = [
      'docType','docNumber','issueDate','serviceDate','dueDate','operationType','purchaseOrder','object','notes',
      'sellerName','legalForm','capital','sellerAddress','sellerSiren','sellerSiret','sellerRcs','sellerVat','sellerPhone','sellerEmail','paymentInfo',
      'clientPro','clientEmail','clientName','clientAddress','billingAddress','deliveryAddress','clientSiren','clientVat',
      'vatRegime','vatDebit','paymentTerms','latePenalty','quoteValidity','discountTerms','insurance','customLegal'
    ];

    let lines = [];

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDays(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function dateFR(value) {
      if (!value) return '';
      return new Date(value + 'T00:00:00').toLocaleDateString('fr-FR');
    }

    function euros(value) {
      return Number(value || 0).toLocaleString('fr-FR', {
        style: 'currency',
        currency: 'EUR'
      });
    }

    function clean(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
        .replaceAll('\n', '<br>');
    }

    // Correction de l'écoute stricte par id sur l'élément document
    function get(id) {
      return document.getElementById(id)?.value || '';
    }

    function set(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = value || '';
    }

    function generateNumber(prefix) {
      const year = new Date().getFullYear();
      const old = localStorage.getItem('devisFacturesFrance');
      let number = 1;

      if (old) {
        try {
          const data = JSON.parse(old);
          const match = String(data.docNumber || '').match(/(\d+)$/);
          if (match) number = Number(match[1]) + 1;
        } catch(e) {}
      }

      return `${prefix}-${year}-${String(number).padStart(3, '0')}`;
    }

    function init() {
      set('docType', 'Devis');
      set('docNumber', generateNumber('DEV'));
      set('issueDate', today());
      set('serviceDate', today());
      set('dueDate', addDays(30));
      set('operationType', 'Prestation de services');
      set('clientPro', 'oui');
      set('vatRegime', 'normal');
      set('vatDebit', 'non');
      set('paymentTerms', '30 jours');
      set('latePenalty', 'Taux BCE + 10 points');
      set('quoteValidity', '30 jours');
      set('discountTerms', 'Aucun escompte pour paiement anticipé');
      lines = [
        { label: 'Prestation', description: '', qty: 1, unit: 'forfait', price: 0, discount: 0, vat: 20 }
      ];
      renderLines();
      render();
    }

    function addLine(data = {}) {
      lines.push({
        label: data.label || '',
        description: data.description || '',
        qty: data.qty ?? 1,
        unit: data.unit || 'unité',
        price: data.price ?? 0,
        discount: data.discount ?? 0,
        vat: data.vat ?? 20
      });
      renderLines();
      render();
    }

    // Écouteurs de changement de type pour l'auto-génération du numéro
    document.addEventListener('change', e => {
      if (e.target && e.target.id === 'docType') {
        const type = e.target.value;
        if (type === 'Devis') set('docNumber', generateNumber('DEV'));
        else if (type === 'Facture') set('docNumber', generateNumber('FAC'));
        else if (type === "Facture d'acompte") set('docNumber', generateNumber('AC'));
        else set('docNumber', generateNumber('AV'));
        render();
      }
    });

    function addService() {
      addLine({ label: 'Prestation de service', unit: 'forfait', vat: 20 });
    }

    function addProduct() {
      addLine({ label: 'Produit / fourniture', unit: 'unité', vat: 20 });
    }

    function removeLine(index) {
      lines.splice(index, 1);
      if (lines.length === 0) addLine();
      renderLines();
      render();
    }

    function updateLine(index, key, value) {
      if (['qty', 'price', 'discount', 'vat'].includes(key)) {
        value = Number(value || 0);
      }
      lines[index][key] = value;
      render();
    }

    function renderLines() {
      const box = document.getElementById('lines');
      box.innerHTML = '';

      lines.forEach((line, index) => {
        const div = document.createElement('div');
        div.className = 'line-card';

        div.innerHTML = `
          <div class="line-grid">
            <div>
              <label>Désignation</label>
              <input value="${clean(line.label).replaceAll('<br>', '')}" oninput="updateLine(${index}, 'label', this.value)" placeholder="Désignation précise">
            </div>
            <div>
              <label>Quantité</label>
              <input type="number" step="0.01" value="${line.qty}" oninput="updateLine(${index}, 'qty', this.value)">
            </div>
            <div>
              <label>Unité</label>
              <input value="${clean(line.unit).replaceAll('<br>', '')}" oninput="updateLine(${index}, 'unit', this.value)">
            </div>
            <div>
              <label>Prix unit. HT</label>
              <input type="number" step="0.01" value="${line.price}" oninput="updateLine(${index}, 'price', this.value)">
            </div>
            <div>
              <label>Remise %</label>
              <input type="number" step="0.01" value="${line.discount}" oninput="updateLine(${index}, 'discount', this.value)">
            </div>
            <div>
              <label>TVA</label>
              <select onchange="updateLine(${index}, 'vat', this.value)">
                ${[20, 10, 5.5, 2.1, 0].map(rate => `
                  <option value="${rate}" ${Number(line.vat) === rate ? 'selected' : ''}>${rate}%</option>
                `).join('')}
              </select>
            </div>
            <button class="mini" onclick="removeLine(${index})">✕</button>
          </div>
          <div class="field" style="margin-top:8px;margin-bottom:0;">
            <label>Description complémentaire</label>
            <input value="${clean(line.description).replaceAll('<br>', '')}" oninput="updateLine(${index}, 'description', this.value)" placeholder="Détail facultatif">
          </div>
        `;

        box.appendChild(div);
      });
    }

    function lineHT(line) {
      const base = Number(line.qty || 0) * Number(line.price || 0);
      const remise = base * Number(line.discount || 0) / 100;
      return base - remise;
    }

    function getTotals() {
      let totalHT = 0;
      let totalTVA = 0;
      const byRate = {};

      lines.forEach(line => {
        const ht = lineHT(line);
        const rate = get('vatRegime') === 'normal' ? Number(line.vat || 0) : 0;
        const tva = ht * rate / 100;

        totalHT += ht;
        totalTVA += tva;
        byRate[rate] = (byRate[rate] || 0) + tva;
      });

      return {
        totalHT,
        totalTVA,
        totalTTC: totalHT + totalTVA,
        byRate
      };
    }

    function sellerBlock() {
      return `
        <div class="company-name">${clean(get('sellerName')) || 'Nom de l’entreprise'}</div>
        <div>
          ${get('legalForm') ? clean(get('legalForm')) + '<br>' : ''}
          ${clean(get('sellerAddress'))}
          <br>
          ${get('sellerSiren') ? '<br>SIREN : ' + clean(get('sellerSiren')) : ''}
          ${get('sellerSiret') ? '<br>SIRET : ' + clean(get('sellerSiret')) : ''}
          ${get('sellerRcs') ? '<br>' + clean(get('sellerRcs')) : ''}
          ${get('capital') ? '<br>Capital social : ' + clean(get('capital')) : ''}
          ${get('sellerVat') ? '<br>N° TVA intracommunautaire : ' + clean(get('sellerVat')) : ''}
          ${get('sellerPhone') ? '<br>Tél : ' + clean(get('sellerPhone')) : ''}
          ${get('sellerEmail') ? '<br>Email : ' + clean(get('sellerEmail')) : ''}
        </div>
      `;
    }

    function clientBlock() {
      return `
        <strong>${clean(get('clientName')) || 'Nom du client'}</strong><br>
        ${clean(get('clientAddress'))}
        ${get('billingAddress') ? '<br><br><strong>Adresse de facturation :</strong><br>' + clean(get('billingAddress')) : ''}
        ${get('deliveryAddress') ? '<br><br><strong>Adresse de livraison :</strong><br>' + clean(get('deliveryAddress')) : ''}
        ${get('clientSiren') ? '<br><br>SIREN client : ' + clean(get('clientSiren')) : ''}
        ${get('clientVat') ? '<br>N° TVA client : ' + clean(get('clientVat')) : ''}
        ${get('clientEmail') ? '<br>Email : ' + clean(get('clientEmail')) : ''}
      `;
    }

    function legalMentions() {
      const mentions = [];

      if (get('vatRegime') === 'franchise') {
        mentions.push('TVA non applicable, art. 293 B du Code général des impôts.');
      }

      if (get('vatRegime') === 'autoliquidation') {
        mentions.push('Auto-liquidation de la TVA.');
      }

      if (get('vatDebit') === 'oui') {
        mentions.push('Option pour le paiement de la taxe d’après les débits.');
      }

      mentions.push(`Conditions de paiement : ${clean(get('paymentTerms')) || 'à compléter'}.`);
      mentions.push(`Date limite de paiement : ${dateFR(get('dueDate')) || 'à compléter'}.`);
      mentions.push(`${clean(get('discountTerms')) || 'Aucun escompte pour paiement anticipé'}.`);
      mentions.push(`Pénalités de retard : ${clean(get('latePenalty')) || 'à compléter'}, exigibles à compter du lendemain de la date de règlement.`);

      if (get('clientPro') === 'oui') {
        mentions.push('Indemnité forfaitaire pour frais de recouvrement en cas de retard de paiement : 40 €.');
      }

      if (get('docType') === 'Devis') {
        mentions.push(`Devis valable ${clean(get('quoteValidity')) || '30 jours'}. Le client est engagé après signature ou accord écrit.`);
      }

      if (get('insurance')) {
        mentions.push(clean(get('insurance')));
      }

      if (get('customLegal')) {
        mentions.push(clean(get('customLegal')));
      }

      mentions.push('Les factures doivent être conservées selon les obligations comptables et fiscales applicables.');
      mentions.push('À partir de la réforme de la facturation électronique, l’émission/réception entre entreprises devra passer par les dispositifs autorisés selon le calendrier légal.');

      return mentions;
    }

    function renderChecklist() {
      const checks = [
        ['Numéro unique du document', !!get('docNumber')],
        ['Date d’émission', !!get('issueDate')],
        ['Identité de l’entreprise', !!get('sellerName') && !!get('sellerAddress')],
        ['SIREN ou SIRET de l’entreprise', !!get('sellerSiren') || !!get('sellerSiret')],
        ['Identité du client', !!get('clientName') && !!get('clientAddress')],
        ['SIREN client si client professionnel', get('clientPro') === 'non' || !!get('clientSiren')],
        ['Nature de l’opération', !!get('operationType')],
        ['Lignes avec désignation, quantité et prix HT', lines.length > 0 && lines.every(l => l.label && Number(l.qty) > 0)],
        ['Taux de TVA ou exonération', true],
        ['Total HT et TTC', true],
        ['Date limite de paiement', !!get('dueDate')],
        ['Pénalités de retard', !!get('latePenalty')],
        ['Indemnité recouvrement 40 € si client professionnel', get('clientPro') === 'oui'],
        ['Adresse de livraison si différente', true],
        ['Option TVA sur les débits si concerné', true]
      ];

      const box = document.getElementById('checklist');
      box.innerHTML = checks.map(([text, ok]) => `
        <div class="check ${ok ? 'ok' : 'warn'}">
          ${ok ? '✓' : '⚠'} ${text}
        </div>
      `).join('');
    }

    function render() {
      const totals = getTotals();
      const isQuote = get('docType') === 'Devis';
      const vatRegime = get('vatRegime');

      const rows = lines.map(line => {
        const ht = lineHT(line);
        const rate = vatRegime === 'normal' ? Number(line.vat || 0) : 0;

        return `
          <tr>
            <td>
              <strong>${clean(line.label)}</strong>
              ${line.description ? '<br><span style="color:#666">' + clean(line.description) + '</span>' : ''}
            </td>
            <td class="right">${Number(line.qty || 0).toLocaleString('fr-FR')}</td>
            <td>${clean(line.unit)}</td>
            <td class="right">${euros(line.price)}</td>
            <td class="right">${Number(line.discount || 0)}%</td>
            <td class="right">${rate}%</td>
            <td class="right">${euros(ht)}</td>
          </tr>
        `;
      }).join('');

      const vatRows = Object.entries(totals.byRate).map(([rate, amount]) => `
        <tr>
          <td>TVA ${rate}%</td>
          <td class="right">${euros(amount)}</td>
        </tr>
      `).join('');

      document.getElementById('paper').innerHTML = `
        <div class="doc-header">
          <div>${sellerBlock()}</div>
          <div class="doc-title">
            <h2>${clean(get('docType')).toUpperCase()}</h2>
            <table class="meta-table">
              <tr><td>Numéro</td><td>${clean(get('docNumber'))}</td></tr>
              <tr><td>Date émission</td><td>${dateFR(get('issueDate'))}</td></tr>
              <tr><td>Date prestation</td><td>${dateFR(get('serviceDate'))}</td></tr>
              <tr><td>Échéance</td><td>${dateFR(get('dueDate'))}</td></tr>
              ${get('purchaseOrder') ? `<tr><td>Bon commande</td><td>${clean(get('purchaseOrder'))}</td></tr>` : ''}
            </table>
          </div>
        </div>

        <div class="boxes">
          <div class="box">
            <h3>Client</h3>
            ${clientBlock()}
          </div>
          <div class="box">
            <h3>Informations</h3>
            <table class="meta-table">
              <tr><td>Objet</td><td>${clean(get('object'))}</td></tr>
              <tr><td>Nature</td><td>${clean(get('operationType'))}</td></tr>
              <tr><td>Régime TVA</td><td>${vatRegime === 'normal' ? 'TVA applicable' : vatRegime === 'franchise' ? 'Franchise en base de TVA' : 'Autoliquidation'}</td></tr>
            </table>
          </div>
        </div>

        <table class="items">
          <thead>
            <tr>
              <th>Désignation</th>
              <th class="right">Qté</th>
              <th>Unité</th>
              <th class="right">Prix unit. HT</th>
              <th class="right">Remise</th>
              <th class="right">TVA</th>
              <th class="right">Total HT</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>

        <div class="totals-zone">
          <div>
            ${get('notes') ? `<strong>Notes :</strong><br>${clean(get('notes'))}` : ''}
            ${get('paymentInfo') ? `<br><br><strong>Paiement :</strong><br>${clean(get('paymentInfo'))}` : ''}
          </div>

          <table class="totals">
            <tr><td>Total HT</td><td class="right">${euros(totals.totalHT)}</td></tr>
            ${vatRegime === 'normal' ? vatRows : `<tr><td>TVA</td><td class="right">${euros(0)}</td></tr>`}
            <tr class="grand"><td>Total TTC</td><td class="right">${euros(totals.totalTTC)}</td></tr>
          </table>
        </div>

        ${isQuote ? `
          <div class="signature-zone">
            <div class="signature">Date, signature et mention “Bon pour accord”</div>
            <div class="signature">Cachet du client, si professionnel</div>
          </div>
        ` : ''}

        <div class="legal">
          <strong>Mentions légales / conditions :</strong>
          <ul>
            ${legalMentions().map(m => `<li>${m}</li>`).join('')}
          </ul>
        </div>
      `;

      renderChecklist();
    }

    function collectData() {
      const data = {};
      fields.forEach(id => data[id] = get(id));
      data.lines = lines;
      return data;
    }

    function applyData(data) {
      fields.forEach(id => set(id, data[id] || ''));
      lines = Array.isArray(data.lines) && data.lines.length ? data.lines : [];
      renderLines();
      render();
    }

    function saveData() {
      localStorage.setItem('devisFacturesFrance', JSON.stringify(collectData()));
      alert('Données sauvegardées dans ce navigateur.');
    }

    function loadData() {
      const data = localStorage.getItem('devisFacturesFrance');
      if (!data) {
        alert('Aucune sauvegarde trouvée.');
        return;
      }
      applyData(JSON.parse(data));
    }

    function exportJSON() {
      const data = JSON.stringify(collectData(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (get('docNumber') || 'document') + '.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById('importFile').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          applyData(JSON.parse(e.target.result));
          alert('Document importé.');
        } catch(err) {
          alert('Fichier JSON invalide.');
        }
      };
      reader.readAsText(file);
    });

    function convertToInvoice() {
      set('docType', 'Facture');
      set('docNumber', generateNumber('FAC'));
      set('issueDate', today());
      set('dueDate', addDays(30));
      render();
    }

    function printPDF() {
      window.print();
    }

    function resetApp() {
      if (confirm('Effacer les données de l’application dans ce navigateur ?')) {
        localStorage.removeItem('devisFacturesFrance');
        init();
      }
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Écoute dynamique sur document avec ciblage strict des IDs
    fields.forEach(id => {
      document.addEventListener('input', e => {
        if (e.target && e.target.id === id) render();
      });
      document.addEventListener('change', e => {
        if (e.target && e.target.id === id) render();
      });
    });

    const saved = localStorage.getItem('devisFacturesFrance');
    if (saved) {
      try {
        applyData(JSON.parse(saved));
      } catch(e) {
        init();
      }
    } else {
      init();
    }
  </script>
</body>
</html>
