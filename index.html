<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devis & Factures France</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d8dee9;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 22px; background: linear-gradient(135deg, #111827, #2563eb); color: #fff; }
    header h1 { margin: 0; font-size: 24px; }
    .container { max-width: 1350px; margin: auto; padding: 18px; display: grid; grid-template-columns: 450px 1fr; gap: 18px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); overflow: hidden; }
    .panel-title { padding: 14px 16px; font-weight: bold; border-bottom: 1px solid var(--border); background: #f9fafb; }
    .panel-body { padding: 16px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px 0; background: #f9fafb; }
    .tab-btn { background: #fff; color: var(--text); border: 1px solid var(--border); padding: 9px 12px; border-radius: 999px; font-size: 13px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab { display: none; }
    .tab.active { display: block; }
    .field { margin-bottom: 11px; }
    label { display: block; font-size: 12px; font-weight: bold; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 14px; }
    textarea { min-height: 70px; resize: vertical; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
    .actions-grid button { width: 100%; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 13px; background: var(--primary); color: #fff; }
    .actions-grid button.secondary { background: #eef2f7; color: var(--text); border: 1px solid var(--border); }
    .actions-grid button.success { background: var(--success); grid-column: span 2; font-size: 14px; padding: 14px; }
    .actions-grid button.danger { background: var(--danger); grid-column: span 2; }
    .buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .buttons button { border: none; border-radius: 10px; padding: 10px 12px; font-weight: bold; cursor: pointer; background: var(--primary); color: #fff; }
    .buttons button.secondary { background: #eef2f7; color: var(--text); border: 1px solid var(--border); }
    .line-card { border: 1px solid var(--border); background: #fbfdff; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    .line-grid { display: grid; grid-template-columns: 1.7fr 0.6fr 0.7fr 0.8fr 0.7fr 0.7fr 42px; gap: 8px; align-items: end; }
    .mini { padding: 9px; background: #eef2f7; color: var(--text); border: 1px solid var(--border); }
    .preview-wrapper { position: sticky; top: 10px; align-self: start; }
    .paper { width: 210mm; min-height: 297mm; background: #fff; margin: auto; padding: 15mm; box-shadow: 0 12px 30px rgba(0,0,0,0.12); border: 1px solid #e5e7eb; font-size: 12px; line-height: 1.35; color: #111; }
    .doc-header { display: grid; grid-template-columns: 1fr 0.9fr; gap: 18px; border-bottom: 3px solid #111; padding-bottom: 12px; margin-bottom: 16px; }
    .company-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .doc-title { text-align: right; }
    .doc-title h2 { margin: 0 0 8px; font-size: 31px; letter-spacing: 1px; }
    table { width: 100%; border-collapse: collapse; }
    .meta-table td { padding: 3px 0; vertical-align: top; }
    .meta-table td:first-child { width: 130px; color: #4b5563; font-weight: bold; }
    .boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .box { border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; min-height: 95px; }
    .box h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; }
    .items th { background: #f3f4f6; border: 1px solid #d1d5db; padding: 7px 6px; text-align: left; font-size: 11px; }
    .items td { border: 1px solid #e5e7eb; padding: 7px 6px; vertical-align: top; }
    .right { text-align: right; }
    .totals-zone { display: grid; grid-template-columns: 1fr 255px; gap: 20px; margin-top: 14px; }
    .totals td { padding: 7px 4px; border-bottom: 1px solid #e5e7eb; }
    .totals .grand td { border-top: 2px solid #111; border-bottom: 2px solid #111; font-size: 16px; font-weight: bold; }
    .signature-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
    .signature { height: 85px; border: 1px dashed #9ca3af; border-radius: 8px; padding: 8px; color: #6b7280; }
    .legal { margin-top: 18px; padding-top: 10px; border-top: 1px solid #d1d5db; font-size: 10.5px; color: #222; }
    .check { padding: 8px; border: 1px solid var(--border); border-left-width: 4px; border-radius: 9px; margin-bottom: 7px; background: #f9fafb; font-size: 12px; }
    .check.ok { border-left-color: var(--success); }
    .check.warn { border-left-color: var(--warning); }
    @media (max-width: 1120px) { .container { grid-template-columns: 1fr; } .preview-wrapper { position: static; } .paper { width: 100%; min-height: auto; padding: 18px; } .line-grid { grid-template-columns: 1fr 1fr; } }
    @media print { body { background: #fff; } header, .editor, .no-print { display: none !important; } .container { display: block; padding: 0; max-width: none; } .panel { border: none; box-shadow: none; } .panel-title { display: none; } .panel-body { padding: 0; } .paper { width: 210mm; min-height: 297mm; margin: 0; padding: 14mm; border: none; box-shadow: none; } @page { size: A4; margin: 0; } }
  </style>
</head>
<body>

  <header>
    <h1>Application Devis & Factures - France</h1>
  </header>

  <main class="container">
    <section class="panel editor">
      <div class="tabs">
        <button class="tab-btn active" data-tab="document">Document</button>
        <button class="tab-btn" data-tab="entreprise">Entreprise</button>
        <button class="tab-btn" data-tab="client">Client</button>
        <button class="tab-btn" data-tab="lignes">Lignes</button>
        <button class="tab-btn" data-tab="mentions">Mentions</button>
      </div>

      <div class="panel-body">
        <div id="tab-document" class="tab active">
          <div class="grid-2">
            <div class="field">
              <label>Type</label>
              <select id="docType" onchange="handleDocTypeChange()">
                <option>Devis</option>
                <option>Facture</option>
                <option>Facture d'acompte</option>
                <option>Avoir</option>
              </select>
            </div>
            <div class="field">
              <label>Numéro unique</label>
              <input id="docNumber">
            </div>
          </div>
          <div class="grid-3">
            <div class="field"><label>Date émission</label><input id="issueDate" type="date"></div>
            <div class="field"><label>Prestation</label><input id="serviceDate" type="date"></div>
            <div class="field"><label>Échéance</label><input id="dueDate" type="date"></div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>Nature</label>
              <select id="operationType">
                <option>Prestation de services</option>
                <option>Vente de biens</option>
              </select>
            </div>
            <div class="field"><label>Bon commande</label><input id="purchaseOrder"></div>
          </div>
          <div class="field"><label>Objet</label><input id="object"></div>
          <div class="field"><label>Notes</label><textarea id="notes"></textarea></div>
        </div>

        <div id="tab-entreprise" class="tab">
          <div class="field"><label>Raison sociale</label><input id="sellerName"></div>
          <div class="grid-2">
            <div class="field"><label>Forme juridique</label><input id="legalForm"></div>
            <div class="field"><label>Capital</label><input id="capital"></div>
          </div>
          <div class="field"><label>Adresse</label><textarea id="sellerAddress"></textarea></div>
          <div class="grid-2">
            <div class="field"><label>SIREN</label><input id="sellerSiren"></div>
            <div class="field"><label>SIRET</label><input id="sellerSiret"></div>
          </div>
          <div class="grid-2">
            <div class="field"><label>RCS</label><input id="sellerRcs"></div>
            <div class="field"><label>TVA Intracom.</label><input id="sellerVat"></div>
          </div>
          <div class="grid-2">
            <div class="field"><label>Téléphone</label><input id="sellerPhone"></div>
            <div class="field"><label>Email</label><input id="sellerEmail"></div>
          </div>
          <div class="field"><label>Paiement</label><textarea id="paymentInfo"></textarea></div>
        </div>

        <div id="tab-client" class="tab">
          <div class="grid-2">
            <div class="field">
              <label>Professionnel ?</label>
              <select id="clientPro"><option value="oui">Oui</option><option value="non">Non</option></select>
            </div>
            <div class="field"><label>Email client</label><input id="clientEmail"></div>
          </div>
          <div class="field"><label>Nom client</label><input id="clientName"></div>
          <div class="field"><label>Adresse client</label><textarea id="clientAddress"></textarea></div>
          <div class="field"><label>Facturation si diff.</label><textarea id="billingAddress"></textarea></div>
          <div class="field"><label>Livraison si diff.</label><textarea id="deliveryAddress"></textarea></div>
          <div class="grid-2">
            <div class="field"><label>SIREN client</label><input id="clientSiren"></div>
            <div class="field"><label>TVA client</label><input id="clientVat"></div>
          </div>
        </div>

        <div id="tab-lignes" class="tab">
          <div id="lines"></div>
          <div class="buttons">
            <button onclick="addLine()">+ Ligne</button>
            <button class="secondary" onclick="addService()">+ Service</button>
            <button class="secondary" onclick="addProduct()">+ Produit</button>
          </div>
        </div>

        <div id="tab-mentions" class="tab">
          <div class="grid-2">
            <div class="field">
              <label>Régime TVA</label>
              <select id="vatRegime" onchange="render()">
                <option value="normal">TVA applicable</option>
                <option value="franchise">Franchise (Art. 293B)</option>
                <option value="autoliquidation">Autoliquidation</option>
              </select>
            </div>
            <div class="field">
              <label>TVA sur débits</label>
              <select id="vatDebit" onchange="render()"><option value="non">Non</option><option value="oui">Oui</option></select>
            </div>
          </div>
          <div class="grid-2">
            <div class="field"><label>Règlement</label><input id="paymentTerms" value="30 jours"></div>
            <div class="field"><label>Pénalités</label><input id="latePenalty" value="Taux BCE + 10 points"></div>
          </div>
          <div class="grid-2">
            <div class="field"><label>Validité</label><input id="quoteValidity" value="30 jours"></div>
            <div class="field"><label>Escompte</label><input id="discountTerms" value="Aucun escompte"></div>
          </div>
          <div class="field"><label>Assurance / Décennale</label><textarea id="insurance"></textarea></div>
          <div class="field"><label>Mentions libres</label><textarea id="
