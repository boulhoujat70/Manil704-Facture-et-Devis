<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devis & Factures France - GitHub</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d8dee9;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --soft: #eff6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px;
      background: linear-gradient(135deg, #111827, #2563eb);
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      max-width: 1350px;
      margin: auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 450px 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .panel-title {
      padding: 14px 16px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      background: #f9fafb;
    }

    .panel-body {
      padding: 16px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
      background: #f9fafb;
    }

    .tab-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tab { display: none; }
    .tab.active { display: block; }

    .field {
      margin-bottom: 11px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }

    .actions-grid button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      background: var(--primary);
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }

    .actions-grid button:hover { filter: brightness(0.95); }
    .actions-grid button:active { transform: scale(0.98); }

    .actions-grid button.secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .actions-grid button.success { background: var(--success); grid-column: span 2; font-size: 14px; padding: 14px; }
    .actions-grid button.danger { background: var(--danger); grid-column: span 2; }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: bold;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
    .buttons button.secondary { background: #eef2f7; color: var(--text); border: 1px solid var(--border); }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .line-card {
      border: 1px solid var(--border);
      background: #fbfdff;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .line-grid {
      display: grid;
      grid-template-columns: 1.7fr 0.6fr 0.7fr 0.8fr 0.7fr 0.7fr 42px;
      gap: 8px;
      align-items: end;
    }

    .mini {
      padding: 9px;
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .preview-wrapper {
      position: sticky;
      top: 10px;
      align-self: start;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      margin: auto;
      padding: 15mm;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.35;
      color: #111;
    }

    .doc-header {
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      gap: 18px;
      border-bottom: 3px solid #111;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .company-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .doc-title {
      text-align: right;
    }

    .doc-title h2 {
      margin: 0 0 8px;
      font-size: 31px;
      letter-spacing: 1px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    .meta-table td {
      padding: 3px 0;
      vertical-align: top;
    }

    .meta-table td:first-child {
      width: 130px;
      color: #4b5563;
      font-weight: bold;
    }

    .boxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .box {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      min-height: 95px;
    }

    .box h3 {
      margin: 0 0 8px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .items th {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      padding: 7px 6px;
      text-align: left;
      font-size: 11px;
    }

    .items td {
      border: 1px solid #e5e7eb;
      padding: 7px 6px;
      vertical-align: top;
    }

    .right { text-align: right; }
    .center { text-align: center; }
